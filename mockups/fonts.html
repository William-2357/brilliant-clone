<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Long Run — Font Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600&family=DM+Mono:wght@500&family=Fira+Code:wght@700&family=IBM+Plex+Mono:wght@600&family=JetBrains+Mono:wght@700&family=Orbitron:wght@700&family=Oxanium:wght@600&family=Rajdhani:wght@700&family=Roboto+Mono:wght@700&family=Share+Tech+Mono&family=Source+Code+Pro:wght@600&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #0d1218; color: #e7ecf2; -webkit-font-smoothing: antialiased; }

  .tool-head { position: sticky; top: 0; z-index: 100; background: #11161d; border-bottom: 1px solid #232b35; padding: 14px 22px 14px; }
  .tool-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .tool-title { font-weight: 800; font-size: 15px; color: #fff; }
  .tool-title small { display: block; font-weight: 500; font-size: 12px; color: #8b96a4; margin-top: 2px; }
  .spacer { flex: 1; }
  .sizer { display: flex; align-items: center; gap: 10px; }
  .sizer label { font-size: 13px; color: #9aa6b2; font-weight: 600; }
  .sizer input { width: 200px; accent-color: #6f9bff; }
  .sizer .val { font-size: 13px; font-weight: 700; color: #fff; min-width: 42px; font-variant-numeric: tabular-nums; }
  .tseg { display: flex; gap: 3px; padding: 3px; background: #1b222c; border: 1px solid #2a323d; border-radius: 10px; }
  .tseg button { border: none; background: transparent; color: #9aa6b2; font-weight: 600; font-size: 13px; padding: 7px 13px; border-radius: 7px; cursor: pointer; }
  .tseg button.on { background: #2c3543; color: #fff; }

  #previews {
    --accent: #0f9d8c; --surface: #ffffff; --text-h: #15242c; --border: #e0e6ea; --muted: #74838d; --bg: #f4f6f8;
    --grid-line: rgba(16,40,48,0.05);
    padding: 24px 22px 64px;
  }
  #previews.dark {
    --accent: #2dd4bf; --surface: #161b22; --text-h: #f1f5f9; --border: #283039; --muted: #7c8a96; --bg: #0e1116;
    --grid-line: rgba(176,196,216,0.05);
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 20px; }
  .fcard { border: 1px solid #2a323d; border-radius: 14px; background: #11161d; overflow: hidden; }
  .fcard-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #1d242d; }
  .fname { font-weight: 700; color: #fff; font-size: 15px; }
  .fnote { font-size: 12px; color: #8b96a4; }
  .fcat { margin-left: auto; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; padding: 4px 9px; border-radius: 999px; }
  .cat-mono { background: #14323a; color: #5fd6c4; }
  .cat-display { background: #281f40; color: #b89cf2; }

  .fcard-body {
    padding: 18px;
    background-color: var(--bg);
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 26px 26px;
  }

  /* Mini topbar = faithful to the real app shell */
  .mini-topbar { display: flex; align-items: center; gap: 11px; padding: 0 16px; min-height: 64px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  .logo { width: calc(var(--wm) * 1.28); height: calc(var(--wm) * 1.28); display: block; flex: none; }
  .wm { color: var(--text-h); font-weight: 700; letter-spacing: -0.01em; font-size: var(--wm); line-height: 1; white-space: nowrap; }

  .hero { margin: 16px 4px 2px; color: var(--text-h); font-weight: 700; font-size: calc(var(--wm) * 1.7); letter-spacing: -0.01em; line-height: 1.1; }
  .sub { margin: 6px 4px 0; color: var(--muted); font-size: 13px; }

  .legend { max-width: 1200px; margin: 0 auto 8px; color: #8b96a4; font-size: 13px; padding: 0 0 4px; }
</style>
</head>
<body>
  <div class="tool-head">
    <div class="tool-row">
      <div class="tool-title">
        The Long Run — Font Explorer
        <small>13 technical typefaces for the wordmark. Drag the slider for size; pick one and tell me "use &lt;font&gt; at &lt;n&gt;px".</small>
      </div>
      <div class="spacer"></div>
      <div class="sizer">
        <label>Size</label>
        <input id="size" type="range" min="16" max="52" step="1" value="28" />
        <span class="val" id="sizeval">28px</span>
      </div>
      <div class="tseg" id="modeSeg">
        <button data-mode="light" class="on">Light</button>
        <button data-mode="dark">Dark</button>
      </div>
    </div>
  </div>

  <div id="previews">
    <div class="grid" id="grid"></div>
  </div>

<script>
  const LOGO = '<svg class="logo" viewBox="0 0 24 24" aria-label="The Long Run"><rect x="1" y="1" width="22" height="22" rx="6" fill="var(--accent)"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4.5V19H20" stroke-width="1.4" opacity="0.5"/><path d="M5 17.8C7 10 12 8 20 7.6" stroke-width="2.1"/></g></svg>';

  const SYS_MONO = "ui-monospace, 'SF Mono', SFMono-Regular, Menlo, 'Cascadia Code', 'Consolas', monospace";

  const FONTS = [
    { name: 'System Mono', css: SYS_MONO,                 weight: 700, cat: 'mono',    note: 'current — SF Mono / Menlo' },
    { name: 'JetBrains Mono', css: "'JetBrains Mono', monospace", weight: 700, cat: 'mono', note: 'modern, friendly code' },
    { name: 'IBM Plex Mono', css: "'IBM Plex Mono', monospace",  weight: 600, cat: 'mono', note: 'corporate-technical' },
    { name: 'Space Mono', css: "'Space Mono', monospace",        weight: 700, cat: 'mono', note: 'retro-technical, distinctive' },
    { name: 'Roboto Mono', css: "'Roboto Mono', monospace",      weight: 700, cat: 'mono', note: 'neutral, very clean' },
    { name: 'Fira Code', css: "'Fira Code', monospace",          weight: 700, cat: 'mono', note: 'developer classic' },
    { name: 'Source Code Pro', css: "'Source Code Pro', monospace", weight: 600, cat: 'mono', note: 'crisp, precise' },
    { name: 'DM Mono', css: "'DM Mono', monospace",              weight: 500, cat: 'mono', note: 'minimal, light-touch' },
    { name: 'Share Tech Mono', css: "'Share Tech Mono', monospace", weight: 400, cat: 'mono', note: 'terminal / instrument readout' },
    { name: 'Orbitron', css: "'Orbitron', sans-serif",          weight: 700, cat: 'display', note: 'sci-fi, futuristic' },
    { name: 'Rajdhani', css: "'Rajdhani', sans-serif",          weight: 700, cat: 'display', note: 'squared, engineering' },
    { name: 'Chakra Petch', css: "'Chakra Petch', sans-serif",  weight: 600, cat: 'display', note: 'industrial-tech' },
    { name: 'Oxanium', css: "'Oxanium', sans-serif",            weight: 600, cat: 'display', note: 'futuristic UI' },
  ];

  const grid = document.getElementById('grid');
  grid.innerHTML = FONTS.map(f => {
    const style = 'font-family:' + f.css.replace(/"/g, '&quot;') + ';font-weight:' + f.weight + ';';
    return '<div class="fcard">' +
      '<div class="fcard-head">' +
        '<span class="fname">' + f.name + '</span>' +
        '<span class="fnote">' + f.note + '</span>' +
        '<span class="fcat ' + (f.cat === 'mono' ? 'cat-mono' : 'cat-display') + '">' + f.cat + '</span>' +
      '</div>' +
      '<div class="fcard-body">' +
        '<div class="mini-topbar">' + LOGO + '<span class="wm" style="' + style + '">The Long Run</span></div>' +
        '<div class="hero" style="' + style + '">The Long Run</div>' +
      '</div>' +
    '</div>';
  }).join('');

  const previews = document.getElementById('previews');
  const size = document.getElementById('size');
  const sizeval = document.getElementById('sizeval');
  function applySize() { previews.style.setProperty('--wm', size.value + 'px'); sizeval.textContent = size.value + 'px'; }
  size.addEventListener('input', applySize);
  applySize();

  document.getElementById('modeSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    previews.classList.toggle('dark', b.dataset.mode === 'dark');
    document.querySelectorAll('#modeSeg button').forEach(x => x.classList.toggle('on', x === b));
  });
</script>
</body>
</html>
