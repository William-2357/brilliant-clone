<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Long Run — Theme Explorer</title>
<style>
  /* ===== Tool chrome (independent of the previewed theme) ===== */
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    background: #0d1218;
    color: #e7ecf2;
    -webkit-font-smoothing: antialiased;
  }
  .tool-head {
    position: sticky; top: 0; z-index: 100;
    background: #11161d; border-bottom: 1px solid #232b35;
    padding: 14px 22px 13px;
  }
  .tool-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .tool-title { font-weight: 800; font-size: 15px; letter-spacing: -0.01em; color: #fff; }
  .tool-title small { display: block; font-weight: 500; font-size: 12px; color: #8b96a4; letter-spacing: 0; margin-top: 2px; }
  .spacer { flex: 1; }
  .tseg { display: flex; gap: 3px; padding: 3px; background: #1b222c; border: 1px solid #2a323d; border-radius: 10px; }
  .tseg button { border: none; background: transparent; color: #9aa6b2; font-weight: 600; font-size: 13px; padding: 7px 13px; border-radius: 7px; cursor: pointer; }
  .tseg button.on { background: #2c3543; color: #fff; }
  .tbtn { border: 1px solid #2a323d; background: #161c24; color: #cdd5de; font-weight: 600; font-size: 13px; padding: 8px 14px; border-radius: 9px; cursor: pointer; }
  .tbtn:hover { border-color: #3a4756; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid #2a323d; background: #161c24; color: #cdd5de;
    padding: 7px 12px 7px 9px; border-radius: 999px; cursor: pointer;
    font-weight: 600; font-size: 13px; transition: border-color .15s, background .15s, color .15s;
  }
  .chip:hover { border-color: #3a4756; }
  .chip.on { border-color: #6f9bff; background: #18233b; color: #fff; }
  .chip .sw { width: 15px; height: 15px; border-radius: 50%; flex: none; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); }

  .css-panel { display: none; padding: 0 22px 8px; }
  .css-panel.show { display: block; }
  .css-panel .css-card { background: #0b1016; border: 1px solid #232b35; border-radius: 12px; margin-top: 12px; overflow: hidden; }
  .css-panel .css-top { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #1d242d; }
  .css-panel .css-top b { font-size: 13px; color: #fff; }
  .css-panel pre { margin: 0; padding: 14px 16px; max-height: 320px; overflow: auto; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: #c7d0da; }

  .stage { padding: 24px 22px 60px; }

  /* Browser-window frame for the full preview */
  .frame { max-width: 1220px; margin: 0 auto; border: 1px solid #2a323d; border-radius: 14px; overflow: hidden; box-shadow: 0 26px 70px rgba(0,0,0,0.5); }
  .frame-bar { display: flex; align-items: center; gap: 7px; padding: 11px 14px; background: #e9edf1; border-bottom: 1px solid #d7dde3; }
  .frame[data-mode='dark'] .frame-bar { background: #0c0f14; border-color: #20262e; }
  .frame-bar .d { width: 11px; height: 11px; border-radius: 50%; }
  .frame-bar .addr { margin-left: 12px; font-size: 12px; color: #6b7682; background: #fff; border: 1px solid #d7dde3; border-radius: 7px; padding: 4px 14px; }
  .frame[data-mode='dark'] .frame-bar .addr { background: #161b22; border-color: #2a323d; color: #8b96a4; }
  .frame--full .app { width: 100%; }

  /* Gallery */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, 380px); gap: 22px; justify-content: center; }
  .gcard { border: 1px solid #2a323d; border-radius: 12px; overflow: hidden; background: #11161d; cursor: pointer; transition: border-color .15s, transform .06s, box-shadow .15s; }
  .gcard:hover { border-color: #3a4756; }
  .gcard:active { transform: scale(0.996); }
  .gcard.on { border-color: #6f9bff; box-shadow: 0 0 0 2px rgba(111,155,255,0.35); }
  .thumb { width: 380px; height: 326px; overflow: hidden; position: relative; }
  .thumb .app { width: 1180px; transform: scale(0.322); transform-origin: top left; pointer-events: none; }
  .gmeta { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border-top: 1px solid #232b35; }
  .gmeta .sw { width: 24px; height: 24px; border-radius: 7px; flex: none; }
  .gname { font-weight: 700; font-size: 14px; color: #fff; }
  .gblurb { font-size: 12px; color: #8b96a4; margin-top: 1px; }

  /* ============================================================
     Previewed app — faithful subset of src/index.css + App.css.
     All color tokens are injected per-instance on the `.app` root.
     ============================================================ */
  .app { --radius: 12px; --radius-sm: 9px; --topbar-h: 60px; --sidebar-w: 272px; color: var(--text); line-height: 1.55; text-align: left; }
  .app h1, .app h2, .app h3 { color: var(--text-h); line-height: 1.2; margin: 0; }
  .app button { font: inherit; cursor: default; }

  .app .layout {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--topbar-h) 1fr;
    min-height: auto;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 26px 26px;
  }
  .app .topbar { grid-column: 1 / -1; grid-row: 1; display: flex; align-items: center; gap: 12px; padding: 0 18px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .app .brand-link { display: flex; align-items: center; gap: 10px; background: none; border: none; padding: 6px 4px; }
  .app .brand-mark { display: block; flex: none; }
  .app .brand-text { font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, 'Cascadia Code', 'Consolas', monospace; font-weight: 700; font-size: 15px; letter-spacing: -0.01em; color: var(--text-h); }
  .app .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .app .sandbox-link { display: inline-flex; align-items: center; gap: 7px; padding: 8px 13px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); font-weight: 600; font-size: 14px; }
  .app .sandbox-link svg { display: block; }
  .app .avatar { display: grid; place-items: center; width: 38px; height: 38px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 700; font-size: 14px; }

  .app .sidebar { grid-column: 1; grid-row: 2; align-self: stretch; height: auto; overflow: hidden; padding: 18px 14px 28px; background: var(--surface); border-right: 1px solid var(--border); }
  .app .sidebar-label { margin: 14px 8px 8px; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .app .sidebar-label:first-child { margin-top: 0; }
  .app .nav-home { width: 100%; text-align: left; border: none; background: transparent; color: var(--text); font-weight: 600; padding: 10px 12px; border-radius: 10px; }
  .app .nav-home.active { background: var(--accent-bg); color: var(--accent-strong); }
  .app .nav-list { display: flex; flex-direction: column; gap: 4px; }
  .app .nav-item { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; padding: 9px 10px; border: 1px solid transparent; border-radius: 12px; background: transparent; }
  .app .nav-item .lesson-glyph { width: 30px; height: 30px; color: var(--muted); }
  .app .nav-item.locked { opacity: .5; }
  .app .nav-text { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .app .nav-title { font-size: 14px; font-weight: 600; color: var(--text-h); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app .nav-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app .nav-lock { color: var(--muted); }
  .app .content { grid-column: 2; grid-row: 2; min-width: 0; padding: 28px 28px 64px; }

  .app .lesson-glyph { display: grid; place-items: center; flex: none; width: 40px; height: 40px; color: var(--text-h); }
  .app .lesson-glyph svg { display: block; }
  .app .ring { position: relative; display: inline-grid; place-items: center; flex: none; }

  .app .page { max-width: 1120px; margin: 0 auto; }
  .app .page-head { margin-bottom: 22px; }
  .app .page-eyebrow { margin: 0 0 6px; font-size: 12px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); }
  .app .page-title { font-size: 30px; letter-spacing: -0.01em; }
  .app .page-sub { margin: 6px 0 0; color: var(--muted); max-width: 60ch; }
  .app .course-grid { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 24px; align-items: start; }
  .app .course-main { min-width: 0; }

  .app .resume-card { display: flex; align-items: center; gap: 16px; width: 100%; text-align: left; padding: 18px 20px; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); background: var(--surface); color: var(--text-h); margin-bottom: 16px; }
  .app .resume-card .resume-icon { width: 52px; height: 52px; color: var(--accent); }
  .app .resume-body { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .app .resume-eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent-strong); }
  .app .resume-title { font-size: 20px; font-weight: 800; color: var(--text-h); }
  .app .resume-sub { font-size: 14px; color: var(--muted); }
  .app .resume-go { font-size: 24px; font-weight: 700; color: var(--accent); }

  .app .unlock-toggle { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface); }
  .app .unlock-track { position: relative; flex: none; width: 42px; height: 24px; border-radius: 999px; background: var(--accent); }
  .app .unlock-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; box-shadow: var(--shadow-sm); transform: translateX(18px); }
  .app .unlock-text { display: flex; flex-direction: column; font-size: 14px; font-weight: 600; color: var(--text-h); }
  .app .unlock-sub { font-size: 12px; font-weight: 400; color: var(--muted); }

  .app .lesson-cards { list-style: none; margin: 0; padding: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .app .lesson-cards li + li .lcard { border-top: 1px solid var(--border); }
  .app .lcard { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; padding: 15px 16px; background: transparent; border: none; }
  .app .lcard:disabled { opacity: .55; }
  .app .lcard-index { flex: none; width: 22px; font-size: 13px; font-weight: 700; color: var(--muted); text-align: center; }
  .app .lcard-icon { width: 40px; height: 40px; color: var(--text-h); }
  .app .lcard-body { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .app .lcard-title { font-weight: 700; color: var(--text-h); }
  .app .lcard-desc { font-size: 13px; color: var(--muted); }
  .app .lcard-lock { color: var(--muted); }
  .app .status-pill { flex: none; font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 999px; border: 1px solid transparent; }
  .app .pill-available, .app .pill-in-progress { background: var(--accent-bg); color: var(--accent-strong); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
  .app .pill-mastered { background: var(--good-bg); color: var(--good); border-color: color-mix(in srgb, var(--good) 35%, transparent); }
  .app .pill-cleared { background: color-mix(in srgb, var(--accent-2) 16%, transparent); color: var(--accent-2); border-color: color-mix(in srgb, var(--accent-2) 35%, transparent); }
  .app .pill-locked { background: var(--surface-3); color: var(--muted); border-color: var(--border); }

  .app .qbar { display: flex; gap: 5px; width: 100%; margin-top: 8px; }
  .app .qseg { flex: 1; height: 6px; border-radius: 999px; background: var(--ring-track); }
  .app .seg-green { background: var(--good); }
  .app .seg-yellow { background: var(--warn); }
  .app .seg-red { background: var(--bad); }

  .app .course-aside { display: flex; flex-direction: column; gap: 16px; }
  .app .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 18px; }
  .app .prog-panel { border-left: 3px solid var(--accent); }
  .app .prog-eyebrow { margin: 0 0 12px; font-size: 12px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); }
  .app .prog-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
  .app .prog-pct { font-size: 34px; font-weight: 800; color: var(--text-h); line-height: 1; letter-spacing: -0.01em; }
  .app .prog-pct small { font-size: 14px; font-weight: 700; color: var(--muted); margin-left: 4px; letter-spacing: 0; }
  .app .prog-meta { font-size: 12px; font-weight: 700; color: var(--accent-strong); background: var(--accent-bg); padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .app .prog-curve { width: 100%; height: auto; display: block; margin: 8px 0; }
  .app .prog-curve-grid { stroke: var(--grid-line); stroke-width: 1; }
  .app .prog-curve-area { fill: var(--accent-bg); }
  .app .prog-curve-line { fill: none; stroke: var(--accent); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  .app .prog-curve-dot { fill: var(--accent); stroke: var(--surface); stroke-width: 2; }
  .app .prog-lines { margin-top: 2px; }
  .app .sl { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .app .sl:last-child { border-bottom: none; }
  .app .sl > span { font-size: 13px; color: var(--muted); }
  .app .sl > b { font-size: 15px; font-weight: 800; color: var(--text-h); }
  .app .streak-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .app .streak-lab { margin: 0; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .app .streak-meta { font-size: 12px; color: var(--muted); }
  .app .streak-meta b { color: var(--text-h); font-weight: 800; }
  .app .weekstrip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .app .day { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .app .day i { width: 100%; height: 30px; border-radius: 8px; background: var(--surface-3); border: 1px solid var(--border); }
  .app .day.on i { background: var(--accent); border-color: transparent; }
  .app .day.today i { box-shadow: 0 0 0 3px var(--accent-bg); border-color: var(--accent); }
  .app .day span { font-size: 11px; color: var(--muted); }
  .app .day.today span { color: var(--accent-strong); font-weight: 700; }

  @media (max-width: 760px) {
    .frame--full .app .course-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="tool-head">
    <div class="tool-row">
      <div class="tool-title">
        The Long Run — Theme Explorer
        <small>8 alternative color schemes on the real course page. Pick one; export the CSS tokens for <code>src/index.css</code>.</small>
      </div>
      <div class="spacer"></div>
      <div class="tseg" id="modeSeg">
        <button data-mode="light" class="on">Light</button>
        <button data-mode="dark">Dark</button>
      </div>
      <div class="tseg" id="viewSeg">
        <button data-view="gallery" class="on">Gallery</button>
        <button data-view="full">Full preview</button>
      </div>
      <button class="tbtn" id="cssToggle">View CSS tokens</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="css-panel" id="cssPanel">
    <div class="css-card">
      <div class="css-top">
        <b id="cssTitle">CSS tokens</b>
        <div class="spacer"></div>
        <button class="tbtn" id="cssCopy">Copy</button>
      </div>
      <pre id="cssOut"></pre>
    </div>
  </div>

  <div class="stage" id="stage"></div>

<script>
/* ---------- Neutral palettes (per mode) ---------- */
const NEU = {
  cool: {
    light: { bg:'#f4f6f8','bg-2':'#eef1f4', surface:'#ffffff','surface-2':'#f5f7f9','surface-3':'#eef2f5','text-h':'#15242c', text:'#4a5a64', muted:'#74838d', border:'#e0e6ea','border-strong':'#cdd6dc','ring-track':'#e6ebee','grid-line':'rgba(16,40,48,0.05)' },
    dark:  { bg:'#0e1116','bg-2':'#0b0e13', surface:'#161b22','surface-2':'#1b212a','surface-3':'#212a34','text-h':'#f1f5f9', text:'#aab6c0', muted:'#7c8a96', border:'#283039','border-strong':'#36414c','ring-track':'#283039','grid-line':'rgba(176,196,216,0.05)' },
  },
  green: {
    light: { bg:'#f5f6f2','bg-2':'#eef1ea', surface:'#ffffff','surface-2':'#f4f7f1','surface-3':'#eaf0e7','text-h':'#1c2b22', text:'#4c5b50', muted:'#75857a', border:'#e1e8df','border-strong':'#cdd8c9','ring-track':'#e6ece2','grid-line':'rgba(20,48,32,0.05)' },
    dark:  { bg:'#0f140f','bg-2':'#0b0f0b', surface:'#161d16','surface-2':'#1b241b','surface-3':'#212c21','text-h':'#ecf3ec', text:'#a7b6a9', muted:'#7c8a7e', border:'#283328','border-strong':'#364436','ring-track':'#283328','grid-line':'rgba(180,216,188,0.05)' },
  },
  warm: {
    light: { bg:'#f8f5f3','bg-2':'#f2ece8', surface:'#ffffff','surface-2':'#faf5f2','surface-3':'#f4ece8','text-h':'#2c1f1a', text:'#5f504a', muted:'#8a7a72', border:'#ece2dc','border-strong':'#dccfc6','ring-track':'#efe6e0','grid-line':'rgba(48,30,24,0.05)' },
    dark:  { bg:'#161110','bg-2':'#110c0b', surface:'#1f1815','surface-2':'#281f1b','surface-3':'#312621','text-h':'#f6ece8', text:'#c0ada4', muted:'#8f7d74', border:'#342822','border-strong':'#45352d','ring-track':'#342822','grid-line':'rgba(216,180,160,0.05)' },
  },
  purple: {
    light: { bg:'#f6f4f8','bg-2':'#f0edf4', surface:'#ffffff','surface-2':'#f7f4f9','surface-3':'#f0ebf4','text-h':'#241a2b', text:'#534a5c', muted:'#82788c', border:'#e8e2ec','border-strong':'#d6ccdc','ring-track':'#ebe6ef','grid-line':'rgba(40,24,48,0.05)' },
    dark:  { bg:'#14101a','bg-2':'#100c15', surface:'#1c1726','surface-2':'#231d2e','surface-3':'#2b2438','text-h':'#f3ecf6', text:'#b4a7be', muted:'#897e92', border:'#2f2839','border-strong':'#3f3548','ring-track':'#2f2839','grid-line':'rgba(200,180,216,0.05)' },
  },
  gray: {
    light: { bg:'#f5f5f6','bg-2':'#eeeef0', surface:'#ffffff','surface-2':'#f6f6f7','surface-3':'#eeeef1','text-h':'#1a1d21', text:'#4b5158', muted:'#767c84', border:'#e4e5e8','border-strong':'#d0d2d6','ring-track':'#e8e9eb','grid-line':'rgba(20,24,32,0.05)' },
    dark:  { bg:'#121316','bg-2':'#0d0e10', surface:'#1a1c20','surface-2':'#1f2227','surface-3':'#262a30','text-h':'#eef0f2', text:'#aab0b8', muted:'#7e858d', border:'#2b2f35','border-strong':'#3a3f46','ring-track':'#2b2f35','grid-line':'rgba(180,196,216,0.05)' },
  },
  paper: {
    light: { bg:'#f4efe4','bg-2':'#ede6d8', surface:'#fbf8f1','surface-2':'#f3eee3','surface-3':'#ece4d4','text-h':'#2a2620', text:'#574f43', muted:'#8a8170', border:'#e4dcca','border-strong':'#d3c8b1','ring-track':'#e8e0cf','grid-line':'rgba(60,48,24,0.05)' },
    dark:  { bg:'#181410','bg-2':'#120f0b', surface:'#211c15','surface-2':'#29231a','surface-3':'#322a1f','text-h':'#f3ecdd', text:'#c0b39d', muted:'#918468', border:'#342c20','border-strong':'#463b2b','ring-track':'#342c20','grid-line':'rgba(216,196,150,0.05)' },
  },
};

/* ---------- Mode-level tokens shared by every theme (semantics + shadows) ---------- */
const MODE = {
  light: {
    good:'#16a34a','good-bg':'rgba(22,163,74,0.12)', warn:'#e0930a','warn-bg':'rgba(224,147,10,0.14)', bad:'#dc2626','bad-bg':'rgba(220,38,38,0.10)',
    'shadow-sm':'0 1px 2px rgba(16,36,48,0.06)', 'shadow':'0 2px 8px rgba(16,36,48,0.07), 0 1px 2px rgba(16,36,48,0.06)', 'shadow-lg':'0 12px 32px rgba(16,36,48,0.12)',
  },
  dark: {
    good:'#34d399','good-bg':'rgba(52,211,153,0.14)', warn:'#fbbf24','warn-bg':'rgba(251,191,36,0.16)', bad:'#f87171','bad-bg':'rgba(248,113,113,0.14)',
    'shadow-sm':'0 1px 2px rgba(0,0,0,0.4)', 'shadow':'0 2px 10px rgba(0,0,0,0.4)', 'shadow-lg':'0 18px 40px rgba(0,0,0,0.55)',
  },
};

/* ---------- The 8 schemes (accent tokens per mode) ---------- */
const THEMES = [
  { id:'teal', name:'Aurora Teal', blurb:'Current — teal + electric blue', neu:'cool',

const KEY_ORDER = ['bg','bg-2','surface','surface-2','surface-3','text-h','text','muted','border','border-strong','accent','accent-2','accent-strong','accent-bg','cyan','good','good-bg','warn','warn-bg','bad','bad-bg','ring-track','grid-line','grad','shadow-sm','shadow','shadow-lg'];

function varsFor(theme, mode) {

function applyVars(el, vars) {

function glyph(id, size, cls) {
  return '<span class="lesson-glyph ' + (cls||'') + '"><svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" aria-hidden><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + (GLYPH[id]||'') + '</g></svg></span>';
}
function lock(size, cls) {
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="' + (cls||'') + '" aria-hidden><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>';
}
function ring(value, size, stroke, color) {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r, cl = Math.max(0, Math.min(1, value)), off = c * (1 - cl), half = size / 2;
  return '<span class="ring" style="width:' + size + 'px;height:' + size + 'px"><svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" aria-hidden><circle cx="' + half + '" cy="' + half + '" r="' + r + '" fill="none" stroke="var(--ring-track)" stroke-width="' + stroke + '"/><circle cx="' + half + '" cy="' + half + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="' + stroke + '" stroke-linecap="round" stroke-dasharray="' + c.toFixed(2) + '" stroke-dashoffset="' + off.toFixed(2) + '" transform="rotate(-90 ' + half + ' ' + half + ')"/></svg></span>';
}
function masteryCurve(points) {
  const W = 280, H = 76, PAD = 7, n = points.length;
  const x = i => PAD + (n <= 1 ? 0 : (i / (n - 1)) * (W - PAD * 2));
  const y = f => PAD + (1 - Math.max(0, Math.min(1, f))) * (H - PAD * 2);
  const line = points.map((f, i) => (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ',' + y(f).toFixed(1)).join(' ');
  const area = line + ' L' + x(n - 1).toFixed(1) + ',' + (H - PAD).toFixed(1) + ' L' + x(0).toFixed(1) + ',' + (H - PAD).toFixed(1) + ' Z';
  return '<svg class="prog-curve" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Course mastery"><line class="prog-curve-grid" x1="0" y1="' + y(1/3) + '" x2="' + W + '" y2="' + y(1/3) + '"/><line class="prog-curve-grid" x1="0" y1="' + y(2/3) + '" x2="' + W + '" y2="' + y(2/3) + '"/><path class="prog-curve-area" d="' + area + '"/><path class="prog-curve-line" d="' + line + '"/><circle class="prog-curve-dot" cx="' + x(n-1).toFixed(1) + '" cy="' + y(points[n-1]).toFixed(1) + '" r="3.6"/></svg>';
}

function ringColorFor(state) {
  if (state === 'mastered') return 'var(--good)';
  if (state === 'cleared') return 'var(--accent-2)';
  return 'var(--accent)';
}

const LOGO = '<svg width="32" height="32" viewBox="0 0 24 24" class="brand-mark" aria-label="The Long Run"><rect x="1" y="1" width="22" height="22" rx="6" fill="var(--accent)"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4.5V19H20" stroke-width="1.4" opacity="0.5"/><path d="M5 17.8C7 10 12 8 20 7.6" stroke-width="2.1"/></g></svg>';

function navItems() {
  return LESSONS.map(l => {
    const locked = l.state === 'locked';
    const trail = locked ? lock(15, 'nav-lock') : ring(l.frac, 24, 3, ringColorFor(l.state));
    return '<button type="button" class="nav-item ' + (locked ? 'locked' : '') + '">' +
      glyph(l.id, 20) +
      '<span class="nav-text"><span class="nav-title">' + l.title + '</span><span class="nav-sub">' + l.concept + '</span></span>' +
      trail + '</button>';
  }).join('');
}

function lessonCards() {
  return LESSONS.map(l => {
    const locked = l.state === 'locked';
    const trail = locked ? lock(16, 'lcard-lock') : ring(l.frac, 34, 3.5, ringColorFor(l.state));
    const qbar = locked ? '' : '<div class="qbar">' + l.segs.map(s => '<span class="qseg ' + s + '"></span>').join('') + '</div>';
    return '<li><button type="button" class="lcard">' +
      '<span class="lcard-index">' + l.index + '</span>' +
      glyph(l.id, 26, 'lcard-icon') +
      '<span class="lcard-body"><span class="lcard-title">' + l.title + '</span><span class="lcard-desc">' + l.concept + '</span>' + qbar + '</span>' +
      trail +
      '<span class="status-pill pill-' + l.state + '">' + PILL[l.state] + '</span>' +
      '</button></li>';
  }).join('');
}

          '<p class="page-eyebrow">The Long Run</p>' +

/* ---------- State + rendering ---------- */
let curTheme = 'teal';
let curMode = 'light';
let curView = 'gallery';

const stage = document.getElementById('stage');
const chipsEl = document.getElementById('chips');

function renderChips() {
  chipsEl.innerHTML = THEMES.map(t => {
    const a = t.light.accent, b = t.light['accent-2'];
    return '<button class="chip ' + (t.id === curTheme ? 'on' : '') + '" data-theme="' + t.id + '">' +
      '<span class="sw" style="background:linear-gradient(135deg,' + a + ' 45%,' + b + ')"></span>' + t.name + '</button>';
  }).join('');
}

function renderFull() {
  const t = THEMES.find(x => x.id === curTheme);
  stage.innerHTML = '<div class="frame frame--full" data-mode="' + curMode + '">' +
    '<div class="frame-bar"><span class="d" style="background:#ff5f57"></span><span class="d" style="background:#febc2e"></span><span class="d" style="background:#28c840"></span>' +
    '<span class="addr">thelongrun.app/learn</span></div>' +
    '<div class="app"></div></div>';
  const app = stage.querySelector('.app');
  app.innerHTML = appHTML();
  applyVars(app, varsFor(t, curMode));
}

function renderGallery() {
  stage.innerHTML = '<div class="gallery">' + THEMES.map(t =>
    '<div class="gcard ' + (t.id === curTheme ? 'on' : '') + '" data-theme="' + t.id + '">' +
      '<div class="thumb"><div class="app"></div></div>' +
      '<div class="gmeta"><span class="sw" style="background:' + t[curMode].grad + '"></span>' +
      '<div><div class="gname">' + t.name + '</div><div class="gblurb">' + t.blurb + '</div></div></div>' +
    '</div>'
  ).join('') + '</div>';
  stage.querySelectorAll('.gcard').forEach(card => {
    const t = THEMES.find(x => x.id === card.dataset.theme);
    const app = card.querySelector('.app');
    const thumb = card.querySelector('.thumb');
    const vars = varsFor(t, curMode);
    thumb.style.background = vars.bg;
    app.innerHTML = appHTML();
    applyVars(app, vars);
  });
}

function render() {
  document.querySelectorAll('#viewSeg button').forEach(b => b.classList.toggle('on', b.dataset.view === curView));
  document.querySelectorAll('#modeSeg button').forEach(b => b.classList.toggle('on', b.dataset.mode === curMode));
  renderChips();
  if (curView === 'full') renderFull(); else renderGallery();
  updateCSS();
}

/* ---------- CSS export ---------- */
function blockFor(theme, mode, selector) {
  const v = varsFor(theme, mode);
  const lines = KEY_ORDER.map(k => '  --' + k + ': ' + v[k] + ';');
  return selector + ' {\n' + lines.join('\n') + '\n}';
}
function updateCSS() {
  const t = THEMES.find(x => x.id === curTheme);
  document.getElementById('cssTitle').textContent = t.name + ' — src/index.css tokens';
  document.getElementById('cssOut').textContent =
    blockFor(t, 'light', ':root') + '\n\n' + blockFor(t, 'dark', ":root[data-theme='dark']");
}

/* ---------- Events ---------- */
document.getElementById('modeSeg').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return; curMode = b.dataset.mode; render();
});
document.getElementById('viewSeg').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return; curView = b.dataset.view; render();
});
chipsEl.addEventListener('click', e => {
  const b = e.target.closest('.chip'); if (!b) return; curTheme = b.dataset.theme;
  if (curView === 'gallery') curView = 'full';
  render();
});
stage.addEventListener('click', e => {
  const card = e.target.closest('.gcard'); if (!card) return;
  curTheme = card.dataset.theme; curView = 'full'; render();
});
document.getElementById('cssToggle').addEventListener('click', () => {
  document.getElementById('cssPanel').classList.toggle('show');
});
document.getElementById('cssCopy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(document.getElementById('cssOut').textContent);
    const b = document.getElementById('cssCopy'); b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy', 1200);
  } catch (_) {}
});

render();
</script>
